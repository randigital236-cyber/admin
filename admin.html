<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Panel - RND Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 25px; text-align: center; }
        .header h1 { font-size: 28px; }
        .header p { opacity: 0.8; margin-top: 5px; }
        
        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stat-card { background: white; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stat-card i { font-size: 45px; color: #667eea; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #1f2937; }
        .stat-card .label { color: #6b7280; font-size: 14px; margin-top: 5px; }
        
        /* Sections */
        .section { background: white; border-radius: 20px; margin: 20px auto; padding: 25px; max-width: 1400px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .section-title { font-size: 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-left: 4px solid #667eea; padding-left: 15px; }
        .section-title i { color: #667eea; }
        
        /* Tables */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f8f9fa; font-weight: 600; color: #374151; }
        tr:hover { background: #f8f9fa; }
        
        /* Status Badges */
        .status-pending { background: #fef3c7; color: #d97706; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-completed { background: #d1fae5; color: #059669; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-processing { background: #dbeafe; color: #2563eb; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        
        /* Buttons */
        .copy-btn { background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .copy-btn:hover { background: #5a67d8; }
        .action-btn { background: #10b981; color: white; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; margin: 0 3px; font-size: 12px; }
        .action-btn.complete { background: #059669; }
        .action-btn.reject { background: #ef4444; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e5e7eb; }
        .tab { padding: 10px 25px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: 500; color: #6b7280; transition: 0.2s; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; margin-bottom: -2px; }
        
        /* Search */
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 14px; }
        .search-box input:focus { outline: none; border-color: #667eea; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-container { padding: 15px; gap: 10px; }
            .stat-card .number { font-size: 24px; }
            th, td { padding: 8px 10px; font-size: 12px; }
            .section { margin: 10px; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-crown"></i> Admin Panel</h1>
        <p>Manage Users & Withdrawals | RND Rewards</p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <div class="number" id="totalUsers">0</div>
            <div class="label">Total Users</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-hand-holding-usd"></i>
            <div class="number" id="totalWithdrawals">0</div>
            <div class="label">Total Withdrawals</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-clock"></i>
            <div class="number" id="pendingWithdrawals">0</div>
            <div class="label">Pending Withdrawals</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <div class="number" id="completedWithdrawals">0</div>
            <div class="label">Completed Withdrawals</div>
        </div>
    </div>

    <div class="section">
        <div class="tabs">
            <button class="tab active" onclick="showTab('users')"><i class="fas fa-users"></i> All Users</button>
            <button class="tab" onclick="showTab('withdrawals')"><i class="fas fa-money-bill-wave"></i> Withdrawal Requests</button>
        </div>

        <!-- Users Tab -->
        <div id="usersTab">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name or email..." onkeyup="searchUsers()">
            </div>
            <div class="table-container">
                <table id="usersTable">
                    <thead>
                        <tr><th>#</th><th>Name</th><th>Email</th><th>Referral Code</th><th>Referral Wallet</th><th>Spin Wallet</th><th>Total Earned</th><th>Joined Date</th></tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>

        <!-- Withdrawals Tab -->
        <div id="withdrawalsTab" style="display:none;">
            <div class="table-container">
                <table id="withdrawalsTable">
                    <thead>
                        <tr><th>#</th><th>User Name</th><th>Email</th><th>Amount</th><th>Wallet Address</th><th>Type</th><th>Status</th><th>Date</th><th>Action</th></tr>
                    </thead>
                    <tbody id="withdrawalsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyARtuToUfDsK6EOrqpJ6nBpfSHx2JobWhQ",
            authDomain: "randigital-e7715.firebaseapp.com",
            databaseURL: "https://randigital-e7715-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "randigital-e7715",
            storageBucket: "randigital-e7715.firebasestorage.app",
            messagingSenderId: "218883279353",
            appId: "1:218883279353:web:cda990aa068f8fdf4d1528"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let allUsers = [];
        let allWithdrawals = [];
        
        // Load all data
        async function loadData() {
            await loadUsers();
            await loadWithdrawals();
            updateStats();
        }
        
        // Load Users
        async function loadUsers() {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val();
            allUsers = [];
            
            if (users) {
                for (let uid in users) {
                    allUsers.push({
                        uid: uid,
                        ...users[uid]
                    });
                }
            }
            displayUsers(allUsers);
        }
        
        // Load Withdrawals
        async function loadWithdrawals() {
            const withdrawalsRef = ref(db, 'withdrawals');
            const snapshot = await get(withdrawalsRef);
            const withdrawals = snapshot.val();
            allWithdrawals = [];
            
            if (withdrawals) {
                for (let wid in withdrawals) {
                    allWithdrawals.push({
                        id: wid,
                        ...withdrawals[wid]
                    });
                }
                // Sort by date (newest first)
                allWithdrawals.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
            displayWithdrawals(allWithdrawals);
        }
        
        // Display Users
        function displayUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';
            
            users.forEach((user, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = index + 1;
                row.insertCell(1).innerHTML = `<strong>${user.name || '-'}</strong>`;
                row.insertCell(2).innerHTML = `<small>${user.email || '-'}</small>`;
                row.insertCell(3).innerHTML = `<code style="background:#f3f4f6; padding:2px 6px; border-radius:6px;">${user.referralCode || '-'}</code>`;
                row.insertCell(4).innerHTML = `<strong style="color:#667eea;">${user.referralWallet || 0}</strong> RND`;
                row.insertCell(5).innerHTML = `<strong style="color:#764ba2;">${user.spinWallet || 0}</strong> RND`;
                row.insertCell(6).innerHTML = `<strong>${user.totalEarned || 0}</strong> RND`;
                row.insertCell(7).innerHTML = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '-';
            });
        }
        
        // Display Withdrawals
        function displayWithdrawals(withdrawals) {
            const tbody = document.getElementById('withdrawalsList');
            tbody.innerHTML = '';
            
            withdrawals.forEach((wd, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = index + 1;
                row.insertCell(1).innerHTML = `<strong>${getUserName(wd.uid)}</strong>`;
                row.insertCell(2).innerHTML = `<small>${getUserEmail(wd.uid)}</small>`;
                row.insertCell(3).innerHTML = `<strong style="color:#059669;">${wd.amount}</strong> RND`;
                row.insertCell(4).innerHTML = `
                    <code style="background:#f3f4f6; padding:4px 8px; border-radius:6px; font-size:11px;">${wd.walletAddress || '-'}</code>
                    <button class="copy-btn" onclick="copyAddress('${wd.walletAddress}')" style="margin-left:8px;"><i class="fas fa-copy"></i></button>
                `;
                row.insertCell(5).innerHTML = wd.walletType === 'referralWallet' ? '💰 Referral' : '🎮 Spin';
                row.insertCell(6).innerHTML = getStatusBadge(wd.status);
                row.insertCell(7).innerHTML = wd.date ? new Date(wd.date).toLocaleString() : '-';
                row.insertCell(8).innerHTML = `
                    ${wd.status === 'pending' ? `<button class="action-btn complete" onclick="updateWithdrawalStatus('${wd.id}', 'completed')"><i class="fas fa-check"></i> Complete</button>
                    <button class="action-btn reject" onclick="updateWithdrawalStatus('${wd.id}', 'rejected')"><i class="fas fa-times"></i> Reject</button>` : '-'}
                `;
            });
        }
        
        function getStatusBadge(status) {
            switch(status) {
                case 'pending': return '<span class="status-pending"><i class="fas fa-clock"></i> Pending</span>';
                case 'completed': return '<span class="status-completed"><i class="fas fa-check-circle"></i> Completed</span>';
                case 'rejected': return '<span class="status-pending" style="background:#fee2e2; color:#dc2626;"><i class="fas fa-times-circle"></i> Rejected</span>';
                default: return '<span class="status-pending">Pending</span>';
            }
        }
        
        // Helper functions
        function getUserName(uid) {
            const user = allUsers.find(u => u.uid === uid);
            return user ? user.name : uid.substring(0, 8);
        }
        
        function getUserEmail(uid) {
            const user = allUsers.find(u => u.uid === uid);
            return user ? user.email : '-';
        }
        
        // Update withdrawal status
        window.updateWithdrawalStatus = async function(id, status) {
            if (confirm(`Are you sure you want to mark this withdrawal as ${status}?`)) {
                await update(ref(db, `withdrawals/${id}`), { status: status, processedAt: new Date().toISOString() });
                await loadWithdrawals();
                updateStats();
                alert(`✅ Withdrawal ${status}!`);
            }
        };
        
        // Copy address
        window.copyAddress = function(address) {
            if (address) {
                navigator.clipboard.writeText(address);
                alert('✅ Address copied to clipboard!');
            }
        };
        
        // Search users
        window.searchUsers = function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                (user.name && user.name.toLowerCase().includes(searchTerm)) ||
                (user.email && user.email.toLowerCase().includes(searchTerm))
            );
            displayUsers(filtered);
        };
        
        // Tab switching
        window.showTab = function(tab) {
            const usersTab = document.getElementById('usersTab');
            const withdrawalsTab = document.getElementById('withdrawalsTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'users') {
                usersTab.style.display = 'block';
                withdrawalsTab.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                usersTab.style.display = 'none';
                withdrawalsTab.style.display = 'block';
                tabs[1].classList.add('active');
            }
        };
        
        // Update stats
        function updateStats() {
            document.getElementById('totalUsers').innerText = allUsers.length;
            document.getElementById('totalWithdrawals').innerText = allWithdrawals.length;
            document.getElementById('pendingWithdrawals').innerText = allWithdrawals.filter(w => w.status === 'pending').length;
            document.getElementById('completedWithdrawals').innerText = allWithdrawals.filter(w => w.status === 'completed').length;
        }
        
        // Auto refresh every 30 seconds
        loadData();
        setInterval(() => {
            loadData();
        }, 30000);
    </script>
</body>
</html>
